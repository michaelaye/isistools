project:
  type: book
  output-dir: _book
  preview:
    port: 4201

book:
  title: "isistools Documentation"
  author: "K.-Michael Aye"
  date: today
  downloads: [pdf]
  chapters:
    - index.qmd
    - part: "CLI Commands"
      chapters:
        - footprints.qmd
        - footprintinit.qmd
        - mosaic.qmd
        - tiepoints.qmd
        - cnet-info.qmd
    - part: "Reference"
      chapters:
        - python-api.qmd

format:
  html:
    theme:
      light: sandstone
      dark: superhero
    toc: true
    toc-depth: 3
    lightbox: true
    number-sections: false
  pdf:
    toc: true
    number-sections: false
    documentclass: report
    papersize: a4
    geometry:
      - margin=2.5cm
